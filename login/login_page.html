<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acer Biomedicals Login Page</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class = "container">
        <div class = "left-panel">
            <div class = "overlay"> </div>
            <div class = "company">
                <img src = "comapny_logo.png" class = "logo">
                <h1>ACER BIOMEDICALS</h1>
                <p>Caring For Life</p>

            </div>
            <div class = "features">
                <div class = "feature">
                    <i class = "fa-solid fa-shield-heart"></i>
                    <div>
                        <h4> Trustred Care</h4>
                        <span>Quality You Can Trust</span>
                    </div>
                </div>
                <div class ="feature">
                    <i class = "fa-solid fa-user-doctor"></i>

                    <div>
                        <h4>Expert Team</h4>
                        <span>Professional Healthcare</span>
                    </div>
                </div>
                <div class = "feature">
                    <i class = "fa-solid fa-heart-pulse"></i>
                    <div>
                        <h4>Better Health</h4>
                        <span> Your Well Being Matters</span>
    
                    </div>
                </div>
                </div>
            </div>
            <div class = "right-panel">
                <div class = "login-card">
                    <h2>Welcome!</h2>
                    <p class = "subtitle">Sign in to your Acer Biomedical Account </p>
                    <form id = "loginform">
                        <div class = "input box">
                            <label>UserName</label>
                            <div class = "input-field">
                                <i class = "fa-regular fa-user"></i>
                                <input type = "text" id = "username" placeholder="Enter your Username">

                            </div>
                        </div>
                        <div class = "input-box">
                            <label>Password</label>
                            <div class = "input-field">
                                <i class = "fa-regular fa-eye togglePassword"></i>
                                <input type = "text" id = "password" placeholder="Enter your Password">
                        </div>
                        </div>
                        <div class = "input-box">
                            <label>User Type</label>
                            <div class = "input-field">
                                <select id = "usertype">
                                    <option value="">Select Your UserType</option>
                                    <option>Admin</option>
                                    <option>Employee</option>
                                    <option>Technician</option>
                                    <option>Distributor</option>
                                </select>
                            </div>
                        </div>
                        <button class = "login-button" ><i class = "fa-solid fa-arrow-right-to-bracket"></i> Login</button>
                    </form>
                    <div class = "footer">
                        &copy 2025 Accure Medicals. All Rights Reserved.
 
                    </div>
                </div>
            </div>
        </div>
<script src = "login_page.js"></script>
</body>
</html>
