<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Acer Biomedical</title>

    <link rel="stylesheet" href="../css/signup.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="signup-body">

    <div class="signup-container">

        <!-- LEFT PANEL -->

        <div class="signup-left">

            <div class="overlay"></div>

            <div class="left-content">

                <div class="logo">

                    <img src="../images/comapny_logo-Photoroom.png" alt="Logo">

                </div>

                <h1>ACER BIOMEDICALS</h1>

                <p class="tagline">
                    Caring For Life
                </p>

                <div class="feature-list">

                    <div class="feature">

                        <i class="fa-solid fa-shield-heart"></i>

                        <div>

                            <h4>Trusted Care</h4>

                            <span>Quality You Can Trust</span>

                        </div>

                    </div>

                    <div class="feature">

                        <i class="fa-solid fa-user-doctor"></i>

                        <div>

                            <h4>Professional Team</h4>

                            <span>Experienced Healthcare Experts</span>

                        </div>

                    </div>

                    <div class="feature">

                        <i class="fa-solid fa-heart-pulse"></i>

                        <div>

                            <h4>Better Health</h4>

                            <span>Your Well Being Matters</span>

                        </div>

                    </div>

                </div>

            </div>

        </div>



        <!-- RIGHT PANEL -->

        <div class="signup-right">

            <div class="signup-card">

                <h2>Create Account</h2>

                <p class="subtitle">
                    Create your Acer Biomedical Account
                </p>

                <form>

                    <div class="row">

                        <div class="input-group">

                            <label>Full Name</label>

                            <div class="input-box">

                                <i class="fa-regular fa-user"></i>

                                <input type="text" placeholder="Enter full name" required>

                            </div>

                        </div>

                        <div class="input-group">

                            <label>Username</label>

                            <div class="input-box">

                                <i class="fa-regular fa-id-badge"></i>

                                <input type="text" placeholder="Choose username" required>

                            </div>

                        </div>

                    </div>



                    <div class="row">

                        <div class="input-group">

                            <label>Mobile Number</label>

                            <div class="input-box">

                                <i class="fa-solid fa-phone"></i>

                                <input type="tel" placeholder="Enter mobile number" required>

                            </div>

                        </div>

                        <div class="input-group">

                            <label>Email Address</label>

                            <div class="input-box">

                                <i class="fa-regular fa-envelope"></i>

                                <input type="email" placeholder="Enter email address" required>

                            </div>

                        </div>

                    </div>



                    <div class="row">

                        <div class="input-group">

                            <label>Password</label>

                            <div class="input-box">

                                <i class="fa-solid fa-lock"></i>

                                <input type="password" placeholder="Create password" required>

                            </div>

                        </div>

                        <div class="input-group">

                            <label>Confirm Password</label>

                            <div class="input-box">

                                <i class="fa-solid fa-lock"></i>

                                <input type="password" placeholder="Confirm password" required>

                            </div>

                        </div>

                    </div>

                    <button class="signup-btn" type="submit">

                        <i class="fa-solid fa-user-plus"></i>

                        Create Account

                    </button>

                    <p class="login-link">

                        Already have an account?

                        <a href="../index.html">

                            Login

                        </a>

                    </p>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
